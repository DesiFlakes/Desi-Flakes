<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desi Flakes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #000000;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 20px 40px;
    position: relative;
    overflow: hidden;
  }

  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 420px;
    width: 100%;
  }

  .logo {
    width: min(78vw, 320px);
    height: auto;
    margin: 0 auto 22px;
    display: block;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #0B0B0B;
    border: 1.5px solid #3BE0E0;
    border-radius: 14px;
    padding: 18px 22px;
    text-decoration: none;
    color: #EAFBFB;
    font-weight: 700;
    font-size: 17px;
    transition: box-shadow 0.2s ease, transform 0.15s ease;
  }

  .link-btn:active { transform: scale(0.98); }

  .link-btn.ig { border-color: #E84393; }
  .link-btn.ig:hover, .link-btn.ig:active { box-shadow: 0 0 18px rgba(232,67,147,0.45); }

  .link-btn.tt { border-color: #3BE0E0; }
  .link-btn.tt:hover, .link-btn.tt:active { box-shadow: 0 0 18px rgba(59,224,224,0.45); }

  .icon { width: 24px; height: 24px; flex-shrink: 0; }

  .label { flex: 1; text-align: left; }
  .sub { display: block; font-weight: 400; font-size: 12.5px; color: #9aa3a3; margin-top: 2px; }

  .arrow { font-size: 18px; color: #3BE0E0; }

  footer {
    margin-top: 40px;
    font-size: 11px;
    color: #5a6262;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="desiflakes-logo.png" alt="Desi Flakes - La touche glacee pour vos evenements">

    <div class="links">
      <a class="link-btn ig" href="https://www.instagram.com/desi.flakes_" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#E84393" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#E84393"/></svg>
        <span class="label">Instagram<span class="sub">@desi.flakes_</span></span>
        <span class="arrow" style="color:#E84393;">→</span>
      </a>

      <a class="link-btn tt" href="https://www.tiktok.com/@desi.flakes" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="#3BE0E0"><path d="M16.5 2h-3.2v13.2c0 1.5-1.2 2.7-2.7 2.7s-2.7-1.2-2.7-2.7 1.2-2.7 2.7-2.7c.3 0 .5 0 .8.1V9.3c-.3 0-.5-.1-.8-.1-3 0-5.5 2.5-5.5 5.5s2.5 5.5 5.5 5.5 5.5-2.5 5.5-5.5V8.2c1.1.8 2.5 1.3 4 1.3V6.3c-2 0-3.6-1.6-3.6-3.6V2z"/></svg>
        <span class="label">TikTok<span class="sub">@desi.flakes</span></span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
